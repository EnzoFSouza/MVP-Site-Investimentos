<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Carteira de Investimentos</title>
  <link rel="stylesheet" href="/css/output.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
    <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Criar conta</h1>

    <form id="form-cadastro" class="space-y-4">
      <div>
        <label for="nome" class="block text-sm font-medium text-gray-700 mb-1">Nome</label>
        <input type="text" id="nome" required
          class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
        <input type="email" id="email" required
          class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label for="senha" class="block text-sm font-medium text-gray-700 mb-1">Senha (mín. 8 caracteres)</label>
        <input type="password" id="senha" required minlength="8"
          class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <p id="mensagem-erro" class="text-red-600 text-sm hidden"></p>

      <button type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition">
        Cadastrar
      </button>
    </form>

    <p class="text-sm text-gray-600 text-center mt-4">
      Já tem conta?
      <a href="/login.html" class="text-blue-600 hover:underline">Entrar</a>
    </p>
  </div>

  <script src="/js/cadastro.js"></script>
</body>
</html>
